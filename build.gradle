apply plugin: 'java'
apply plugin: 'application'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.google.guava:guava:23.0'

    testImplementation 'junit:junit:4.13.2'
}

mainClassName = 'App'

task display {
    doLast {
        println 'Good Morning its a devops class'
    }
}
